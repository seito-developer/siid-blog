# PR ごとに lint / 型チェック / ユニットテストを実行する CI。
# build は microCMS の API キー（シークレット）が必要なため Vercel 側で担保する。
name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 依存インストール
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: 型チェック
        run: npm run typecheck
      - name: ユニットテスト
        run: npm test
